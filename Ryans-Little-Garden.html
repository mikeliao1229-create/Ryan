<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ryan's Little Garden</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.heat/0.2.0/leaflet-heat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d1f17; --ink2:#3c4a43; --muted:#67746c; --faint:#9aa69f;
  --indigo:#059669; --violet:#10b981;
  --add:#047857; --add-bg:rgba(5,150,105,.12); --add-bd:rgba(5,150,105,.30);
  --rem:#be123c; --rem-bg:rgba(225,29,72,.10); --rem-bd:rgba(225,29,72,.28);
  --mod:#b45309; --mod-bg:rgba(217,119,6,.12); --mod-bd:rgba(217,119,6,.30);
  --glass:#ffffff;
  --glass-strong:#ffffff;
  --glass-bd:#e7ece9;
  --line:rgba(13,31,23,.08);
  --sh-sm:0 1px 2px rgba(13,31,23,.04);
  --sh:0 1px 2px rgba(13,31,23,.04), 0 6px 18px rgba(13,31,23,.06);
  --sh-lg:0 14px 40px rgba(13,31,23,.10);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",sans-serif;
  color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:.01em;
  background:#f4f6f5;
  height:100%;position:relative;overflow:hidden;
}
.blob{display:none}
.wrap{position:relative;z-index:1;max-width:1760px;margin:0 auto;padding:14px 24px;height:100vh;display:flex;flex-direction:column;gap:12px;overflow:hidden}
@supports(height:100dvh){.wrap{height:100dvh}}

.glass{background:#fff;border:1px solid var(--glass-bd);box-shadow:var(--sh);border-radius:var(--radius)}
.glass-strong{background:#fff;border:1px solid var(--glass-bd);box-shadow:var(--sh);border-radius:var(--radius)}

.head{text-align:center;margin-bottom:16px}
.head h1{font-size:23px;font-weight:800;letter-spacing:1px;background:linear-gradient(120deg,var(--indigo),var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent}
.head p{font-size:13px;color:var(--muted);margin-top:4px}

.section{padding:0;margin:0;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
#landing{position:fixed;inset:0;z-index:250;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden;background:radial-gradient(900px 620px at 50% 24%,#eefaf4 0%,#ffffff 62%)}
#landing.hide{display:none}
.leaf{position:absolute;color:#34d399;opacity:.15;pointer-events:none;animation:floatY 12s ease-in-out infinite}
.leaf svg{width:100%;height:100%;display:block}
.leaf path:first-child{fill:currentColor}
.leaf path:last-child{display:none}
.l1{width:64px;height:64px;top:15%;left:13%;animation-duration:13s}
.l2{width:44px;height:44px;top:22%;right:16%;color:#10b981;opacity:.13;animation-duration:10s;animation-delay:-3s}
.l3{width:86px;height:86px;bottom:12%;left:18%;color:#6ee7b7;opacity:.12;animation-duration:15s;animation-delay:-5s}
.l4{width:40px;height:40px;bottom:22%;right:20%;color:#34d399;opacity:.16;animation-duration:9s;animation-delay:-1.5s}
.l5{width:30px;height:30px;top:62%;left:50%;color:#10b981;opacity:.1;animation-duration:16s;animation-delay:-6s}
@keyframes floatY{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-22px) rotate(8deg)}}
.landing-card{position:relative;display:flex;flex-direction:column;align-items:center;gap:14px;padding:44px 56px;border-radius:28px;background:#fff;border:1px solid #eef2f0;box-shadow:0 30px 70px rgba(13,40,28,.10);animation:cardIn .7s cubic-bezier(.2,.8,.2,1) both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
.mascot-wrap{width:170px;height:170px;display:flex;align-items:center;justify-content:center}
.mascot{width:170px;height:170px;overflow:visible}
.mascot .bob{animation:bob 3.4s ease-in-out infinite}
.mascot .eyes{transform-origin:110px 115px;animation:blink 4.6s infinite}
.mascot .whisky{transform-origin:178px 140px;animation:swayp 3s ease-in-out infinite}
.mascot .drop{transform-box:fill-box;transform-origin:center;animation:spurt 1.1s ease-out infinite}
.mascot .d2{animation-delay:.28s}.mascot .d3{animation-delay:.55s}.mascot .d4{animation-delay:.82s}
@keyframes spurt{0%{transform:translate(0,0) scale(.5);opacity:0}15%{opacity:1}100%{transform:translate(20px,-30px) scale(1.1);opacity:0}}
.m-shadow{fill:rgba(5,150,105,.16);transform-origin:110px 198px;animation:shadowp 3.4s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes blink{0%,93%,100%{transform:scaleY(1)}96%{transform:scaleY(.1)}}
@keyframes swayp{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(6deg)}}
@keyframes shadowp{0%,100%{transform:scaleX(1);opacity:.5}50%{transform:scaleX(.86);opacity:.35}}
.brand-title{font-size:25px;font-weight:900;color:var(--ink);letter-spacing:.03em}
.brand-title span{color:#059669}
.brand-sub{font-size:12.5px;color:var(--muted);letter-spacing:.14em;margin-top:-6px}
.btn-hero{position:relative;margin-top:8px;background:#059669;color:#fff;font-weight:700;font-size:16px;padding:14px 40px;border-radius:14px;border:none;cursor:pointer;box-shadow:0 12px 26px rgba(5,150,105,.28);transition:.18s;font-family:inherit;letter-spacing:.06em}
.btn-hero:hover{transform:translateY(-2px);box-shadow:0 18px 36px rgba(5,150,105,.4)}
@media(max-width:560px){.landing-card{padding:34px 30px}.leaf{display:none}}

/* 上傳 */
.uploader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 22px;text-align:center;
  border:1.5px dashed rgba(5,150,105,.42);border-radius:18px;background:rgba(255,255,255,.4);transition:.18s;cursor:pointer}
.uploader.over{background:rgba(99,102,241,.12);border-color:var(--indigo)}
.uploadbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 16px;margin-bottom:12px;cursor:pointer;transition:.18s}
.uploadbar.over{background:rgba(99,102,241,.16)}
.uploadbar .filelist{margin-top:0;justify-content:flex-start}
.uploader .big{font-size:18px;font-weight:800;margin-bottom:6px}
.uploader .hint{font-size:13px;color:var(--muted);margin-bottom:20px;max-width:520px}
.btn{font-family:inherit;font-weight:700;font-size:14px;border-radius:13px;padding:12px 22px;cursor:pointer;border:1px solid transparent;transition:.16s;white-space:nowrap}
.btn-primary{background:linear-gradient(120deg,var(--indigo),var(--violet));color:#fff;box-shadow:0 10px 26px rgba(5,150,105,.34)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 32px rgba(5,150,105,.42)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{background:var(--glass-strong);border:1px solid var(--glass-bd);color:var(--ink2);box-shadow:var(--sh-sm)}
.btn-ghost:hover{background:#fff}
.btn-sm{padding:8px 15px;font-size:13px;border-radius:11px}
.filelist{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
.chip{font-size:12.5px;font-weight:700;color:var(--ink2);background:var(--glass-strong);border:1px solid var(--glass-bd);
  padding:6px 14px;border-radius:999px;box-shadow:var(--sh-sm)}
.banner{padding:13px 18px;border-radius:14px;font-size:13.5px;margin-top:18px;font-weight:600}
.banner.info{background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.28);color:#15803d}
.banner.warn{background:var(--mod-bg);border:1px solid var(--mod-bd);color:#92400e}
.banner b{font-weight:800}

/* 結果 */
.result-head{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.result-head h2{font-size:18px;font-weight:800}
.result-head .meta{font-size:13px;color:var(--muted)}
.spacer{flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:0 0 12px}
/* iPad（平板） */
@media(max-width:1024px){
  .wrap{padding:18px 24px 60px}
}
@media(max-width:820px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .wrap{padding:16px 18px 56px}
}
/* iPhone（手機） */
@media(max-width:560px){
  .wrap{padding:10px 12px}
  .head h1{font-size:20px}
  .head p{font-size:12px}
  .section{padding:14px}
  .uploader{padding:22px 14px}
  .stats{gap:10px;margin:12px 0 8px}
  .stat{padding:14px 15px}
  .stat .n{font-size:25px}
  .stat .l{font-size:12px}
  .bar{gap:8px}
  .search-in{width:100%}
  .searchcol{width:100%;align-items:stretch}
  .result-head{flex-direction:column;align-items:flex-start;gap:8px}
  .subtab{font-size:13px;padding:8px 13px}
  .sortbar{gap:8px}
  .sortbtn{font-size:13px;padding:8px 12px}
  thead th,tbody td{padding:9px 10px;font-size:13px}
  .name-c{min-width:130px}
  .addr-c{min-width:150px}
}
.stat{padding:11px 16px;border-radius:13px}
.stat .n{font-size:25px;font-weight:800;line-height:1.04;letter-spacing:-.5px}
.stat .l{font-size:12px;font-weight:700;color:var(--muted);margin-top:1px}
.stat.add .n{color:var(--add)} .stat.rem .n{color:var(--rem)} .stat.mod .n{color:var(--mod)} .stat.same .n{color:var(--indigo)}

.bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px}
.subtabs{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;min-width:0;max-width:100%;padding-bottom:2px}
.subtab{font-family:inherit;font-weight:700;font-size:13.5px;padding:9px 17px;border-radius:999px;cursor:pointer;
  border:1px solid var(--glass-bd);background:var(--glass);color:var(--ink2);transition:.15s}
.subtab.active{color:#fff;border-color:transparent}
.subtab.active[data-k=all]{background:linear-gradient(120deg,var(--indigo),var(--violet))}
.subtab.active[data-k=added]{background:var(--add)} .subtab.active[data-k=removed]{background:var(--rem)} .subtab.active[data-k=modified]{background:var(--mod)}
.sub-badge{font-weight:800;margin-left:6px}
.sortbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.sortbar .sl{font-size:13px;font-weight:800;color:var(--muted)}
.sortbtn{font-family:inherit;font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:12px;cursor:pointer;
  border:1px solid var(--glass-bd);background:var(--glass-strong);color:var(--ink2);box-shadow:var(--sh-sm);transition:.15s}
.sortbtn:hover{background:#fff;transform:translateY(-1px)}
.sortbtn.on{background:linear-gradient(120deg,var(--indigo),var(--violet));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(5,150,105,.32)}
.sortbtn.clr{background:var(--rem);color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(190,18,60,.3)}
.sortbtn.clr:hover{background:#a30d33;color:#fff}
.filterbtn{font-family:inherit;font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:12px;cursor:pointer;border:1px solid var(--glass-bd);background:var(--glass-strong);color:var(--ink2);box-shadow:var(--sh-sm);transition:.15s}
.filterbtn:hover{background:#fff;transform:translateY(-1px)}
.filterbtn.on{background:linear-gradient(120deg,var(--indigo),var(--violet));color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(5,150,105,.32)}
.search-in{font-family:inherit;font-size:13.5px;padding:9px 14px;border-radius:10px;border:1px solid var(--glass-bd);
  background:#fff;outline:none;width:260px;box-shadow:var(--sh-sm)}
.search-in:focus{border-color:var(--indigo);box-shadow:0 0 0 3px rgba(5,150,105,.16)}
.searchcol{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.cbtn{font-family:inherit;font-weight:600;font-size:13px;letter-spacing:.01em;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid transparent;background:transparent;color:var(--ink2);transition:.15s;white-space:nowrap}
.cbtn:hover{background:#f3f6f4}
.cbtn.active,.cbtn.primary{background:var(--indigo);color:#fff;border-color:transparent;box-shadow:0 1px 2px rgba(5,150,105,.3)}
.cbtn.active:hover,.cbtn.primary:hover{background:#047857;color:#fff}
.cgroup{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.vsep{width:1px;height:22px;background:var(--line);flex:none}
#listView{flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch}
#mapPage{position:fixed;inset:0;z-index:300;background:#f4f6f5;display:none;flex-direction:column;padding:12px;gap:10px}
#mapPage.open{display:flex}
.mappage-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:var(--ink2)}
.mapbar-txt{font-size:12.5px;color:var(--muted);font-weight:600}
#mapPage .cbtn.active{background:var(--indigo);color:#fff}
.mfilter{display:flex;gap:4px;flex-wrap:wrap}
.map-wrap{position:relative;flex:1;min-height:0;display:flex}
#map{flex:1;min-height:0;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
.map-panel{position:absolute;top:12px;z-index:1000;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--glass-bd);border-radius:14px;padding:14px 16px;box-shadow:var(--sh-lg);color:var(--ink)}
#mapInfo{left:12px;width:186px}
#districtStats{right:12px;width:216px;max-height:80%;overflow:auto}
.kpi{margin-bottom:11px}
.kpi-n{font-size:25px;font-weight:800;color:var(--indigo);line-height:1.05;letter-spacing:.02em}
.kpi-l{font-size:11px;color:var(--muted);margin-top:2px}
.legend{margin-top:4px;border-top:1px solid var(--line);padding-top:10px;display:flex;flex-direction:column;gap:7px}
.lg-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink2)}
.lg-sep{height:1px;background:var(--line);margin:1px 0}
.dot{width:11px;height:11px;border-radius:50%;flex:none}
.dot.ring-o{background:transparent;border:2px solid #d97706}
.dot.ring-r{background:transparent;border:2px solid #dc2626}
.ms-title{font-weight:800;color:var(--ink);font-size:13px;margin-bottom:2px}
.ms-tot{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px}
.ms-foot{font-size:10.5px;color:var(--faint);margin-top:8px;text-align:center}
.ms-barwrap{height:4px;border-radius:2px;background:#eaf0ed;overflow:hidden;margin-top:3px}
.ms-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--indigo),var(--violet))}
.ms-tbl{width:100%;border-collapse:collapse;font-size:11.5px}
.ms-tbl th{font-size:10.5px;color:var(--muted);text-align:left;padding:3px 5px;border-bottom:1px solid var(--line);position:static;background:transparent;white-space:nowrap;box-shadow:none;border-radius:0}
.ms-tbl td{padding:3px 5px;border-bottom:1px solid var(--line);color:var(--ink2)}
.ms-tbl tbody tr{cursor:pointer;transition:background .12s}
.ms-tbl tbody tr:hover{background:#eef5f1}
.ms-tbl td:nth-child(n+2),.ms-tbl th:nth-child(n+2){text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:600px){.map-panel{width:154px;font-size:11px;max-height:46%}#mapInfo{display:none}#districtStats{right:8px;top:8px}}
.mapbar{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;flex-wrap:wrap;gap:6px 16px;align-items:center}
.mapbar b{font-weight:800}
.leaflet-popup-content{font-size:13px;line-height:1.65;color:var(--ink)}
td a,.ucard-row a,.leaflet-popup-content a{color:var(--indigo);font-weight:700;text-decoration:none}
td a:hover,.ucard-row a:hover,.leaflet-popup-content a:hover{text-decoration:underline}
.cbtn.vb.active{background:var(--indigo);color:#fff;border-color:transparent}
#topbar{flex-direction:row;align-items:center;gap:8px;flex-wrap:wrap}
.g{display:contents}
.gl{font-size:12.5px;font-weight:800;color:var(--muted)}
#topbar .search-in{width:240px;flex:0 1 240px}
@media(max-width:600px){
  #topbar{flex-direction:column;align-items:stretch;gap:10px}
  .g{display:flex;align-items:center;gap:8px;flex-wrap:wrap;width:100%}
  #topbar .search-in{flex:1 1 auto;width:auto;min-width:120px}
}
.cbtn.fb,.cbtn.sb{font-size:13px;padding:7px 13px}
.cbtn.fb{position:relative}
.cnt{margin-left:5px;font-size:12px;font-weight:700;color:var(--indigo)}
.cbtn.active .cnt{color:#fff}
.sord{display:inline-flex;align-items:center;margin-left:8px;padding:2px 9px;border-radius:999px;background:#fff;color:#059669;font-size:11px;font-weight:800;line-height:1.5}
.sarrow{margin-left:6px;opacity:.55}
.mapbtn{display:inline-flex;align-items:center;gap:5px;color:var(--indigo)}
.mapbtn svg{width:15px;height:15px}
#c-added,#c-removed,#c-modified{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;padding:0 6px;margin-left:6px;border-radius:999px;color:#fff;font-size:11px;font-weight:800;line-height:1}
#c-added{background:#059669}
#c-removed{background:#dc2626}
#c-modified{background:#d97706}
.cbtn.active #c-added,.cbtn.active #c-removed,.cbtn.active #c-modified{box-shadow:0 0 0 1.5px rgba(255,255,255,.75)}
#f-removed{color:#dc2626}
#f-removed.active{background:#dc2626;color:#fff}
#f-due{color:#b45309}
#f-due.active{background:#b45309;color:#fff}
#f-due .cnt{color:#b45309}
#f-due.active .cnt{color:#fff}

.subview{display:none}.subview.active{display:flex;flex-direction:column;min-height:0;flex:1}
.tablewrap{overflow:auto;-webkit-overflow-scrolling:touch;border-radius:14px;flex:1;min-height:0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;font-size:11.5px;font-weight:700;color:#ecfdf5;letter-spacing:.1em;
  padding:13px 16px;border-bottom:none;white-space:nowrap;background:#059669;box-shadow:inset 0 1px 0 rgba(255,255,255,.22),0 4px 12px rgba(6,95,70,.18);position:sticky;top:0;z-index:2}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top}
#listView tbody tr{transition:background .12s,box-shadow .12s}
#listView tbody tr:hover{background:#eef9f3;box-shadow:inset 3px 0 0 var(--indigo)}
tbody tr:hover{background:rgba(255,255,255,.5)}
.name-c{font-weight:700;min-width:170px;color:var(--ink)}
.addr-c{color:var(--muted);min-width:190px;font-size:13px}
.idx{color:var(--faint);width:38px;font-variant-numeric:tabular-nums}
/* 「全部」表格：緊湊排版，電腦版一個畫面看完所有欄位 */
.alltable{font-size:12.5px;width:100%}
.alltable thead th{font-size:11.5px;padding:8px 10px;white-space:nowrap;line-height:1.3}
.alltable td{padding:7px 10px;white-space:nowrap;vertical-align:top}
.alltable td.name-c{white-space:normal;min-width:96px;max-width:170px}
.alltable td.addr-c{white-space:normal;min-width:120px;max-width:240px;font-size:12px}
.lb{border-left:3px solid transparent;padding-left:11px}
#sub-added .lb{border-left-color:var(--add)} #sub-removed .lb{border-left-color:var(--rem)} #sub-modified .lb{border-left-color:var(--mod)}
.chg{display:flex;flex-direction:column;gap:5px}
.chg-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:13px}
.chg-f{font-weight:800;color:var(--mod);background:var(--mod-bg);border:1px solid var(--mod-bd);padding:1px 9px;border-radius:7px;font-size:12px}
.chg-o{color:var(--rem);text-decoration:line-through;opacity:.85}
.chg-n{color:var(--add);font-weight:800}
.arrow{color:var(--faint)}
#sub-all .lb{border-left-color:var(--indigo)}
.tag{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 11px 3px 8px;border-radius:999px;letter-spacing:.02em;white-space:nowrap;line-height:1.7}
.tag::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;margin-right:6px;flex:none}
.tag.add{color:#047857;background:rgba(5,150,105,.12)}
.tag.rem{color:#be123c;background:rgba(225,29,72,.12)}
.tag.mod{color:#b45309;background:rgba(217,119,6,.13)}
.tag.same{color:#64748b;background:rgba(100,116,139,.10)}
.empty{text-align:center;color:var(--muted);padding:44px 20px;font-size:14px}
/* 手機卡片式介面 */
.cards{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0;overflow:auto;padding:12px}
.ucard{background:#fff;border:1px solid var(--glass-bd);border-radius:14px;box-shadow:var(--sh-sm);padding:12px 14px;transition:transform .12s,box-shadow .12s,border-color .12s}
.ucard:hover{box-shadow:var(--sh);border-color:rgba(5,150,105,.4)}
.ucard-top{display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;user-select:none}
.ucard-right{display:flex;align-items:center;gap:8px;white-space:nowrap}
.ucard-toggle{font-size:13px;font-weight:800;color:var(--indigo)}
.ucard-toggle::after{content:'▾'}
.ucard.open .ucard-toggle::after{content:'▴'}
.ucard-body{display:none;margin-top:8px}
.ucard.open .ucard-body{display:block}
.ucard-name{font-weight:800;font-size:14.5px;line-height:1.4}
.ucard-row{display:flex;justify-content:space-between;gap:14px;font-size:12.5px;padding:5px 0;border-top:1px dashed var(--line)}
.ucard-row .k{color:var(--muted);font-weight:700;white-space:nowrap}
.ucard-row .v{text-align:right;word-break:break-word}

.foot{text-align:center;color:var(--muted);font-size:12px;margin-top:28px;line-height:1.9}
.hide{display:none!important}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:90;
  background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:12px 22px;border-radius:13px;
  box-shadow:0 16px 40px rgba(0,0,0,.3);opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<script>
/* ====== 比對核心（key = 機構名稱 + 地址） ====== */
function normVal(v){ if(v==null) return ''; return String(v).replace(/\s+/g,' ').trim(); }
function isNumeric(s){ return /^-?\d+(\.\d+)?$/.test(s); }
function valEq(a,b){ if(a===b) return true; if(isNumeric(a)&&isNumeric(b)) return parseFloat(a)===parseFloat(b); return false; }
function parseDate(s){ if(!s) return null; s=String(s).trim(); const m=s.match(/^(\d{3,4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/); if(m){ let y=+m[1]; if(y<1911) y+=1911; return new Date(y,(+m[2])-1,+m[3]); } return null; }
function daysUntil(s){ const d=parseDate(s); if(!d) return null; const t=new Date(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
const DUE_DAYS=90;
function locateCols(h){ const find=(...k)=>{for(let i=0;i<h.length;i++){const x=normVal(h[i]);if(k.some(q=>x.includes(q)))return i;}return -1;};
  return{name:find('機構名稱'),address:find('地址'),contact:find('聯絡人'),phone:find('電話'),contract:find('契約期限'),monthly:find('每月垃圾量')};}
function buildIndex(aoa){ const headers=(aoa[0]||[]).map(normVal); const col=locateCols(headers);
  const nameIdx=col.name>=0?col.name:1, addrIdx=col.address>=0?col.address:10;
  const map=new Map(), order=[]; let used=0;
  for(let r=1;r<aoa.length;r++){ const raw=aoa[r]||[]; const cells=headers.map((_,i)=>normVal(raw[i]));
    const nm=cells[nameIdx]||'', ad=cells[addrIdx]||''; if(nm===''&&ad==='') continue;
    let key=nm+''+ad; while(map.has(key)) key+='#';
    map.set(key,{key,name:nm,address:ad,cells}); order.push(key); used++; }
  return {headers,col,nameIdx,addrIdx,map,order,count:used}; }
function compareIdx(o,n){ const added=[],removed=[],modified=[]; let unchanged=0; const cmp=[];
  for(let i=0;i<n.headers.length;i++){ if(i===n.nameIdx||i===n.addrIdx) continue; cmp.push(i); }
  for(const k of n.order){ const nr=n.map.get(k); if(!o.map.has(k)){ added.push(nr); continue; }
    const or=o.map.get(k), diffs=[];
    for(const i of cmp){ const ov=or.cells[i]||'', nv=nr.cells[i]||''; if(!valEq(ov,nv)) diffs.push({field:n.headers[i]||('欄'+(i+1)),old:ov,now:nv}); }
    if(diffs.length) modified.push(Object.assign({},nr,{diffs})); else unchanged++; }
  for(const k of o.order){ if(!n.map.has(k)) removed.push(o.map.get(k)); }
  return {added,removed,modified,unchanged}; }

function digitsOf(name){ const m=(name||'').match(/\d+/g); return m?parseInt(m.join('').slice(0,12),10):null; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }

/* ====== 狀態（純記憶體，不寫入任何儲存空間） ====== */
let current=null; // {result,newIdx,addedKeys,modKeys}
let allSort={key:null,dir:1};
let allStatusFilter='all';
const SORT_DEFAULT={monthly:-1,contract:1};
const HDR_RENAME={'事業產源機構名稱':'機構名稱','事業產源聯絡人':'聯絡人','事業機構產源地址':'地址','事業機構產源連絡電話':'電話'};
const isPhone=()=>window.matchMedia('(max-width:600px)').matches;
function cardRow(k,v){ return (v==null||v==='')?'':'<div class="ucard-row"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'; }

function readXlsx(file){ return new Promise((res,rej)=>{ const fr=new FileReader();
  fr.onload=e=>{ try{ const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    res({name:file.name, idx:buildIndex(XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''}))});
  }catch(err){ rej(err); } };
  fr.onerror=()=>rej(new Error('讀取失敗')); fr.readAsArrayBuffer(file); }); }

async function handleFiles(files){
  files=[...files].filter(f=>/\.(xlsx|xls)$/i.test(f.name));
  if(files.length<2){ toast('請一次選取兩個 Excel 檔'); return; }
  try{
    const parsed=[]; for(const f of files) parsed.push(await readXlsx(f));
    const withN=parsed.map(p=>({p,n:digitsOf(p.name)}));
    const allN=withN.every(x=>x.n!=null);
    withN.sort((a,b)=> allN ? a.n-b.n : a.p.name.localeCompare(b.p.name));
    const oldP=withN[0].p, newP=withN[withN.length-1].p;
    const result=compareIdx(oldP.idx,newP.idx);
    current={result,newIdx:newP.idx,
      addedKeys:new Set(result.added.map(r=>r.key)),
      modKeys:new Set(result.modified.map(r=>r.key)),
      removedKeys:new Set(result.removed.map(r=>r.key))};
    allSort={key:null,dir:1}; allStatusFilter='all';
    showResult(result, oldP.name+' → '+newP.name);
  }catch(err){ toast('讀取失敗：'+err.message); }
}

function showResult(){
  document.getElementById('landing').classList.add('hide');
  document.getElementById('topbar').classList.remove('hide');
  document.getElementById('resultSection').classList.remove('hide');
  document.querySelectorAll('.needdata').forEach(e=>e.classList.remove('hide'));
  document.getElementById('search').value='';
  render();
}
function matchQ(row,q){ if(!q) return true; q=q.toLowerCase(); return (row.name||'').toLowerCase().includes(q)||(row.address||'').toLowerCase().includes(q); }
function sortAllRows(rows){
  if(!allSort.key) return rows;
  const idx = allSort.key==='monthly'?current.newIdx.col.monthly:current.newIdx.col.contract;
  const dir=allSort.dir;
  const getv=row=>{ const raw=(idx>=0&&row.cells&&row.cells[idx]!=null)?row.cells[idx]:'';
    if(allSort.key==='monthly'){ const f=parseFloat(raw); return isNaN(f)?null:f; }
    const d=parseDate(raw); return d?d.getTime():null; };
  return rows.slice().sort((a,b)=>{ const va=getv(a),vb=getv(b);
    if(va==null&&vb==null) return 0; if(va==null) return 1; if(vb==null) return -1; return (va-vb)*dir; });
}
function dueList(){ const n=current.newIdx, i=n.col.contract; return n.order.map(k=>n.map.get(k)).filter(r=>{ const d=daysUntil((i>=0&&r.cells[i])||''); return d!=null && d<=DUE_DAYS; }); }
function getRows(){ const n=current.newIdx, R=current.result;
  if(allStatusFilter==='added') return R.added.slice();
  if(allStatusFilter==='removed') return R.removed.slice();
  if(allStatusFilter==='modified') return R.modified.slice();
  if(allStatusFilter==='same') return n.order.map(k=>n.map.get(k)).filter(r=>!current.addedKeys.has(r.key)&&!current.modKeys.has(r.key));
  if(allStatusFilter==='due'){ const i=n.col.contract; return dueList().sort((a,b)=>{ const da=daysUntil((i>=0&&a.cells[i])||''), db=daysUntil((i>=0&&b.cells[i])||''); return (da==null?1e9:da)-(db==null?1e9:db); }); }
  return n.order.map(k=>n.map.get(k));
}
function statusTag(row){ if(current.removedKeys.has(row.key)) return '<span class="tag rem">刪除</span>';
  if(current.addedKeys.has(row.key)) return '<span class="tag add">新增</span>';
  if(current.modKeys.has(row.key)) return '<span class="tag mod">異動</span>';
  return '<span class="tag same">未變動</span>'; }
function bindCards(el){ el.querySelectorAll('.ucard-top').forEach(t=>t.onclick=()=>t.parentElement.classList.toggle('open')); }
function renderFullInto(el,rows){
  const idx=current.newIdx, headers=idx.headers;
  const hideCol=i=>{ const x=headers[i]||''; return /廠別/.test(x)||/代清業/.test(x); };
  if(!rows.length){ el.innerHTML='<div class="empty">沒有資料</div>'; return; }
  if(isPhone()){
    let h='<div class="cards">';
    rows.forEach(row=>{ h+='<div class="ucard"><div class="ucard-top"><span class="ucard-name">'+esc(row.name)+'</span><span class="ucard-right">'+statusTag(row)+'<span class="ucard-toggle"></span></span></div><div class="ucard-body">';
      headers.forEach((hd,ci)=>{ if(hideCol(ci)||ci===idx.nameIdx) return; const v=row.cells[ci]!=null?row.cells[ci]:'';
        if(ci===idx.col.phone && v) h+='<div class="ucard-row"><span class="k">電話</span><span class="v"><a href="tel:'+telHref(v)+'">'+esc(v)+'</a></span></div>';
        else h+=cardRow(HDR_RENAME[hd]||hd, v); });
      h+='</div></div>'; });
    el.innerHTML=h+'</div>'; bindCards(el); return;
  }
  let h='<table class="alltable"><thead><tr><th>#</th><th>狀態</th>';
  headers.forEach((hd,i)=>{ if(hideCol(i)) return; h+='<th>'+esc(HDR_RENAME[hd]||hd)+'</th>'; });
  h+='</tr></thead><tbody>';
  rows.forEach((row,i)=>{ h+='<tr><td class="idx lb">'+(i+1)+'</td><td>'+statusTag(row)+'</td>';
    headers.forEach((hd,ci)=>{ if(hideCol(ci)) return; const v=row.cells[ci]!=null?row.cells[ci]:'';
      const cls=ci===idx.nameIdx?' class="name-c"':(ci===idx.addrIdx?' class="addr-c"':'');
      let st='', inner=esc(v);
      if(ci===idx.col.contract){ const d=daysUntil(v); if(d!=null){ if(d<0) st=' style="color:#dc2626;font-weight:700"'; else if(d<=DUE_DAYS) st=' style="color:#b45309;font-weight:700"'; } }
      if(ci===idx.col.phone && v) inner='<a href="tel:'+telHref(v)+'">'+esc(v)+'</a>';
      h+='<td'+cls+st+'>'+inner+'</td>'; });
    h+='</tr>'; });
  el.innerHTML=h+'</tbody></table>';
}
function renderModInto(el,rows){
  if(!rows.length){ el.innerHTML='<div class="empty">沒有資料</div>'; return; }
  if(isPhone()){
    let h='<div class="cards">';
    rows.forEach(row=>{ let d=''; row.diffs.forEach(x=>{ d+='<div class="ucard-row"><span class="k">'+esc(x.field)+'</span><span class="v"><span class="chg-o">'+esc(x.old||'(空)')+'</span> → <span class="chg-n">'+esc(x.now||'(空)')+'</span></span></div>'; });
      h+='<div class="ucard"><div class="ucard-top"><span class="ucard-name">'+esc(row.name)+'</span><span class="ucard-right"><span class="tag mod">異動</span><span class="ucard-toggle"></span></span></div><div class="ucard-body">'+cardRow('地址',row.address)+d+'</div></div>'; });
    el.innerHTML=h+'</div>'; bindCards(el); return;
  }
  let h='<table><thead><tr><th>#</th><th>機構名稱</th><th>地址</th><th>變更內容（舊 → 新）</th></tr></thead><tbody>';
  rows.forEach((row,i)=>{ let c='<div class="chg">'; row.diffs.forEach(d=>{ c+='<div class="chg-row"><span class="chg-f">'+esc(d.field)+'</span><span class="chg-o">'+esc(d.old||'(空)')+'</span><span class="arrow">→</span><span class="chg-n">'+esc(d.now||'(空)')+'</span></div>'; }); c+='</div>';
    h+='<tr><td class="idx lb">'+(i+1)+'</td><td class="name-c">'+esc(row.name)+'</td><td class="addr-c">'+esc(row.address)+'</td><td>'+c+'</td></tr>'; });
  el.innerHTML=h+'</tbody></table>';
}
/* ====== 地圖（OpenStreetMap + Leaflet，免費即時定位） ====== */
let currentView='list', map=null, cluster=null, mapRows=[], mapFitted=false, heatOn=false, heatLayer=null;
const CENTROIDS={
 '中正區':[25.032,121.518],'大同區':[25.063,121.513],'中山區':[25.069,121.538],'松山區':[25.060,121.557],
 '大安區':[25.026,121.543],'萬華區':[25.032,121.499],'信義區':[25.033,121.566],'士林區':[25.094,121.526],
 '北投區':[25.132,121.501],'內湖區':[25.069,121.594],'南港區':[25.055,121.607],'文山區':[24.989,121.570],
 '板橋區':[25.012,121.459],'三重區':[25.073,121.488],'中和區':[24.999,121.499],'永和區':[25.011,121.514],
 '新莊區':[25.036,121.450],'新店區':[24.967,121.541],'土城區':[24.972,121.443],'蘆洲區':[25.085,121.473],
 '汐止區':[25.066,121.659],'樹林區':[24.991,121.420],'三峽區':[24.934,121.369],'鶯歌區':[24.955,121.354],
 '淡水區':[25.169,121.441],'林口區':[25.077,121.391],'五股區':[25.083,121.438],'泰山區':[25.059,121.430],
 '八里區':[25.146,121.398],'深坑區':[25.002,121.615],'石碇區':[24.991,121.658],'瑞芳區':[25.108,121.810],
 '基隆市':[25.128,121.741],'桃園市':[24.993,121.301],'其他':[25.04,121.55]};
function jit(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return [((h%1000)/1000-0.5)*0.014, (((h>>>10)%1000)/1000-0.5)*0.014]; }
function geocodeLocal(addr){ const d=districtOf(addr); const b=CENTROIDS[d]||CENTROIDS['其他']; if(!b) return null; const o=jit(addr||''); return {lat:b[0]+o[0], lon:b[1]+o[1]}; }
function statusColor(row){ if(current.removedKeys.has(row.key)) return '#dc2626';
  if(current.addedKeys.has(row.key)) return '#059669';
  if(current.modKeys.has(row.key)) return '#d97706'; return '#64748b'; }
function statusName(row){ if(current.removedKeys.has(row.key)) return '刪除';
  if(current.addedKeys.has(row.key)) return '新增';
  if(current.modKeys.has(row.key)) return '異動'; return '未變動'; }
function telHref(s){ return String(s).replace(/[^\d+]/g,''); }
function popupHtml(row){ const c=row.cells, col=current.newIdx.col;
  const g=k=>{ const i=col[k]; return (i>=0&&c&&c[i]!=null)?esc(c[i]):''; };
  const ph=g('phone'); const phHtml=ph?'<a href="tel:'+telHref(ph)+'">'+ph+'</a>':'';
  const addr='<a href="https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(row.address||'')+'" target="_blank" rel="noopener">'+esc(row.address)+'</a>';
  return '<b>'+esc(row.name)+'</b>　<span style="color:'+statusColor(row)+';font-weight:800">'+statusName(row)+'</span><br>'+
    addr+'<br>契約期限：'+g('contract')+'<br>每月垃圾量：'+g('monthly')+(phHtml?'　電話：'+phHtml:''); }
function initMap(){ if(map) return;
  map=L.map('map',{zoomControl:true}).setView([25.04,121.55],11);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,subdomains:'abcd',attribution:'© OpenStreetMap, © CARTO'}).addTo(map);
  cluster=L.markerClusterGroup({chunkedLoading:true}); map.addLayer(cluster); }
function volOf(row){ const i=current.newIdx.col.monthly; const v=parseFloat((i>=0&&row.cells&&row.cells[i])||''); return isNaN(v)?0:v; }
function mk(row,c){ const v=volOf(row); const radius=Math.max(5,Math.min(20,5+Math.sqrt(Math.max(0,v))*3));
  const i=current.newIdx.col.contract; const d=daysUntil((i>=0&&row.cells&&row.cells[i])||'');
  let ring='#fff', rw=1.5; if(d!=null){ if(d<0){ ring='#dc2626'; rw=3; } else if(d<=DUE_DAYS){ ring='#d97706'; rw=3; } }
  const m=L.circleMarker([c.lat,c.lon],{radius:radius,color:ring,weight:rw,fillColor:statusColor(row),fillOpacity:.9}); m.bindTooltip(esc(row.name),{direction:'top',offset:[0,-4]}); m.bindPopup(popupHtml(row)); return m; }
function districtOf(a){ const m=String(a||'').match(/[縣市]([一-龥]{1,4}?[區鄉鎮市])/); return m?m[1]:'其他'; }
function zoomDistrict(d){ const lls=[]; mapRows.forEach(r=>{ if(districtOf(r.address)===d){ const c=geocodeLocal(r.address); if(c) lls.push([c.lat,c.lon]); } });
  if(!lls.length){ toast('「'+d+'」尚未定位完成'); return; }
  try{ map.fitBounds(L.latLngBounds(lls).pad(0.25)); }catch(e){} }
function renderDistrictStats(){ const el=document.getElementById('districtStats'); if(!el) return;
  const agg={}; mapRows.forEach(r=>{ const d=districtOf(r.address); if(!agg[d]) agg[d]={n:0,vol:0}; agg[d].n++; agg[d].vol+=volOf(r); });
  const arr=Object.entries(agg).sort((a,b)=>b[1].vol-a[1].vol);
  const eld=document.getElementById('kpiDist'); if(eld) eld.textContent=arr.length;
  if(!arr.length){ el.innerHTML=''; return; }
  const totN=arr.reduce((s,e)=>s+e[1].n,0), totV=arr.reduce((s,e)=>s+e[1].vol,0), maxV=arr[0][1].vol||1;
  let h='<div class="ms-title">區域清運量</div>';
  h+='<div class="ms-tot">合計 '+totN+' 家　·　總量 '+(Math.round(totV*10)/10)+' 公噸</div>';
  h+='<table class="ms-tbl"><thead><tr><th>區域</th><th>家</th><th>量</th></tr></thead><tbody>';
  arr.forEach(([d,v])=>{ const pct=Math.round(v.vol/maxV*100);
    h+='<tr data-d="'+esc(d)+'"><td>'+esc(d)+'</td><td>'+v.n+'</td><td>'+(Math.round(v.vol*10)/10)+'<div class="ms-barwrap"><div class="ms-bar" style="width:'+pct+'%"></div></div></td></tr>'; });
  el.innerHTML=h+'</tbody></table><div class="ms-foot">點任一列放大該區</div>';
  el.querySelectorAll('tr[data-d]').forEach(tr=>tr.onclick=()=>zoomDistrict(tr.dataset.d));
}
function refreshMapMarkers(){ if(!cluster) return; cluster.clearLayers();
  if(heatLayer){ map.removeLayer(heatLayer); heatLayer=null; }
  let done=0,fail=0; const pts=[], lls=[];
  mapRows.forEach(r=>{ const c=geocodeLocal(r.address);
    if(c){ done++; lls.push([c.lat,c.lon]); if(heatOn) pts.push([c.lat,c.lon,Math.max(0.2,Math.min(1,volOf(r)/10))]); else cluster.addLayer(mk(r,c)); }
    else fail++; });
  if(heatOn && pts.length && L.heatLayer){ heatLayer=L.heatLayer(pts,{radius:26,blur:18,maxZoom:17}); map.addLayer(heatLayer); }
  const totVol=mapRows.reduce((s,r)=>s+volOf(r),0);
  const elc=document.getElementById('kpiCount'), elv=document.getElementById('kpiVol');
  if(elc) elc.textContent=mapRows.length; if(elv) elv.textContent=Math.round(totVol*10)/10;
  if(!mapFitted && lls.length && map){ try{ map.fitBounds(L.latLngBounds(lls).pad(0.2)); }catch(e){} mapFitted=true; }
}
function renderMap(rows){ initMap(); mapRows=rows.filter(r=>r.address); mapFitted=false;
  refreshMapMarkers(); renderDistrictStats(); setTimeout(()=>{ if(map) map.invalidateSize(); },60); }

function render(){
  if(!current) return;
  const n=current.newIdx, R=current.result;
  document.getElementById('c-all').textContent=n.count;
  document.getElementById('c-added').textContent=R.added.length;
  document.getElementById('c-removed').textContent=R.removed.length;
  document.getElementById('c-modified').textContent=R.modified.length;
  document.getElementById('c-same').textContent=R.unchanged;
  document.getElementById('c-due').textContent=dueList().length;
  document.querySelectorAll('#topbar .fb').forEach(b=>b.classList.toggle('active',b.dataset.st===allStatusFilter));
  document.querySelectorAll('#topbar .sb').forEach(b=>{ const k=b.dataset.sort,on=allSort.key===k;
    b.classList.toggle('active',on);
    const base=k==='monthly'?'每月垃圾量':'契約期限';
    const dir=k==='monthly'?(allSort.dir>0?'少→多':'多→少'):(allSort.dir>0?'早→晚':'晚→早');
    b.innerHTML= on ? base+'<span class="sord">'+dir+'</span>' : base+'<span class="sarrow">⇅</span>'; });
  const rows=currentRows();
  const el=document.getElementById('listView');
  if(allStatusFilter==='modified') renderModInto(el,rows); else renderFullInto(el,rows);
}
function currentRows(){ const q=document.getElementById('search').value.trim(); return sortAllRows(getRows().filter(x=>matchQ(x,q))); }
function openMap(){ if(!current) return; currentView='map'; document.getElementById('mapPage').classList.add('open'); document.querySelectorAll('#mapPage .mfb').forEach(b=>b.classList.toggle('active',b.dataset.mst===allStatusFilter)); renderMap(currentRows()); }
function closeMap(){ currentView='list'; document.getElementById('mapPage').classList.remove('open'); }

function reset(){
  current=null; allStatusFilter='all'; allSort={key:null,dir:1}; heatOn=false;
  closeMap();
  document.getElementById('resultSection').classList.add('hide');
  document.querySelectorAll('.needdata').forEach(e=>e.classList.add('hide'));
  document.getElementById('topbar').classList.add('hide');
  document.getElementById('landing').classList.remove('hide');
  document.getElementById('search').value='';
  toast('已清除');
}

/* ====== 事件 ====== */
function openPicker(){
  const inp=document.createElement('input');
  inp.type='file'; inp.multiple=true; inp.accept='.xlsx,.xls'; inp.style.display='none';
  inp.addEventListener('change',()=>{ const fs=inp.files?[...inp.files]:[]; setTimeout(()=>inp.remove(),0); handleFiles(fs); });
  document.body.appendChild(inp); inp.click();
}
document.getElementById('btnPick').onclick=openPicker;
document.getElementById('btnPickHero').onclick=openPicker;
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{ e.preventDefault(); if(e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files.length) handleFiles([...e.dataTransfer.files]); });
document.querySelectorAll('#topbar .fb').forEach(b=>b.onclick=()=>{ allStatusFilter=b.dataset.st; render(); });
document.querySelectorAll('#topbar .sb').forEach(b=>b.onclick=()=>{ const k=b.dataset.sort;
  if(allSort.key!==k) allSort={key:k,dir:SORT_DEFAULT[k]};
  else if(allSort.dir===SORT_DEFAULT[k]) allSort={key:k,dir:-SORT_DEFAULT[k]};
  else allSort={key:null,dir:1};
  render(); });
document.getElementById('btnMap').onclick=openMap;
document.getElementById('btnMapBack').onclick=closeMap;
document.querySelectorAll('#mapPage .mfb').forEach(b=>b.onclick=()=>{ allStatusFilter=b.dataset.mst; document.querySelectorAll('#mapPage .mfb').forEach(x=>x.classList.toggle('active',x===b)); renderMap(currentRows()); });
function copyList(){ if(!mapRows.length){ toast('沒有資料可複製'); return; }
  const col=current.newIdx.col; const g=(r,k)=>{ const i=col[k]; return (i>=0&&r.cells&&r.cells[i]!=null)?String(r.cells[i]):''; };
  const totVol=mapRows.reduce((s,r)=>s+volOf(r),0);
  const head='【清運清單】共 '+mapRows.length+' 家 · 總量 '+(Math.round(totVol*10)/10)+' 公噸/月\n';
  const text=head+mapRows.map((r,i)=>(i+1)+'. '+r.name+'｜'+r.address+'｜'+g(r,'phone')+'｜每月 '+g(r,'monthly')+' 公噸｜契約至 '+g(r,'contract')).join('\n');
  navigator.clipboard.writeText(text).then(()=>toast('已複製 '+mapRows.length+' 筆清單')).catch(()=>toast('複製失敗，請改用電腦瀏覽器')); }
document.getElementById('btnCopyList').onclick=copyList;
let _searchT;document.getElementById('search').oninput=()=>{clearTimeout(_searchT);_searchT=setTimeout(render,160);};
function fitAll(){ const lls=[]; mapRows.forEach(r=>{ const c=geocodeLocal(r.address); if(c) lls.push([c.lat,c.lon]); }); if(lls.length){ try{ map.fitBounds(L.latLngBounds(lls).pad(0.2)); }catch(e){} } }
document.getElementById('btnFit').onclick=fitAll;
document.getElementById('btnHeat').onclick=()=>{ heatOn=!heatOn; document.getElementById('btnHeat').classList.toggle('active',heatOn); refreshMapMarkers(); };
document.getElementById('btnReset').onclick=reset;
let _wasPhone=isPhone();
window.addEventListener('resize',()=>{ const now=isPhone(); if(now!==_wasPhone){ _wasPhone=now; if(current) render(); } });
</script>
